name: tests

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm ci || npm install
      - run: npm run lint
      - run: npm test
